services:

  mysql:
    image: mysql:8.0
    container_name: ai-shopping-mysql

    environment:
      MYSQL_DATABASE: ai_shopping
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./resources/db-migrations/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:latest
    container_name: ai-shopping-redis

    ports:
      - "6379:6379"

volumes:
  mysql_data: